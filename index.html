<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>عالم الجوكر</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: linear-gradient(135deg, #6e30f2, #41a18c); padding: 30px; border-radius: 20px; display: inline-block; }
        input { padding: 10px; border-radius: 10px; border: none; width: 80%; margin-bottom: 10px; }
        button { background: #fff; color: #6e30f2; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>أهلاً بك في عالم الجوكر</h1>
        <input type="text" id="userIn" placeholder="اكتب أمرك هنا يا عبد الله...">
        <br>
        <button onclick="send()">ابدأ التنفيذ الآن</button>
        <p id="response"></p>
    </div>
    <script>
        async function send() {
            const msg = document.getElementById('userIn').value;
            const res = await fetch('https://joker-assets.onrender.com/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            document.getElementById('response').innerText = data.reply;
        }
    </script>
</body>
</html>
