<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- خلفية دائرية -->
  <circle cx="100" cy="100" r="95" fill="#FF6B35" stroke="#000" stroke-width="3"/>
  
  <!-- الوجه -->
  <circle cx="100" cy="80" r="50" fill="#FFE66D" stroke="#000" stroke-width="2"/>
  
  <!-- العيون -->
  <circle cx="80" cy="70" r="8" fill="#000"/>
  <circle cx="120" cy="70" r="8" fill="#000"/>
  
  <!-- الحواجب -->
  <path d="M 70 55 Q 80 50 90 55" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110 55 Q 120 50 130 55" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- الابتسامة (ابتسامة جوكر مجنونة) -->
  <path d="M 85 95 Q 100 115 115 95" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- الشعر/التاج -->
  <polygon points="50,40 65,20 80,35 100,15 120,35 135,20 150,40" fill="#9B59B6" stroke="#000" stroke-width="2"/>
  
  <!-- نقاط جوكر (كرات ملونة) -->
  <circle cx="60" cy="150" r="8" fill="#FF1744" stroke="#000" stroke-width="1.5"/>
  <circle cx="100" cy="155" r="8" fill="#FFD600" stroke="#000" stroke-width="1.5"/>
  <circle cx="140" cy="150" r="8" fill="#00BCD4" stroke="#000" stroke-width="1.5"/>
</svg>